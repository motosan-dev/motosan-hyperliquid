name: Publish to crates.io

on:
  push:
    tags:
      - "rust-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --features ws,k256-signer

      - name: Publish crates
        run: |
          cargo publish -p hl-types || true
          sleep 30
          cargo publish -p hl-signing || true
          sleep 30
          cargo publish -p hl-client || true
          sleep 30
          cargo publish -p hl-market || true
          sleep 30
          cargo publish -p hl-account || true
          sleep 30
          cargo publish -p hl-executor || true
          sleep 30
          cargo publish -p motosan-hyperliquid || true
